name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # todos los días a las 00:00
  workflow_dispatch:
  push:
    branches:
      - main
      - create_readme   # así puedes probarlo en tu rama

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: aMonteSl
          outputs: |
            # Versión para modo claro: fondo muy oscuro + niveles de verde claros
            dist/github-snake.svg?color_snake=#00ff00&color_dots=#111111,#145214,#22a322,#55dd55,#a8ffa8
            # Versión para modo oscuro: aún más contraste en niveles altos
            dist/github-snake-dark.svg?color_snake=#00ff00&color_dots=#050505,#0c3b0c,#188018,#39c339,#b6ffb6

      - name: Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
