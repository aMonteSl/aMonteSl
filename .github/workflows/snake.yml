name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # todos los días a las 00:00
  workflow_dispatch:
  push:
    branches:
      - main
      - create_readme   # así puedes probarlo en tu rama

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: aMonteSl
          outputs: |
            # Versión para modo claro: paleta marrón cálida alineada con el tema del perfil
            dist/github-snake.svg?color_snake=#DCA293&color_dots=#040304,#1a1a1a,#8c6a5e,#d2b6a1,#efd2bc
            # Versión para modo oscuro: paleta marrón con mayor contraste
            dist/github-snake-dark.svg?color_snake=#DCA293&color_dots=#040304,#0a0a0a,#6f544a,#c8956b,#EFD2BC

      - name: Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
